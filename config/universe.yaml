# =========================================================
#  Evren tanımı — tek gerçek kaynak (single source of truth)
# =========================================================
#  Her sembol tam olarak bir sepete (basket) ve bir temaya (theme) aittir.
#  - basket: sepet ağırlıkları config/strategy.yaml'da tutulur; burada yalnız
#    sembolün hangi sepete ait olduğu belirtilir.
#  - theme: yoğunlaşma kontrolü ve `global_top_n` seçim modu bunu kullanır
#    (tema başına en çok 2 pozisyon). 60/60 sembol tema etiketli olmalıdır.
#
#  Not: v1 sinyal motoru ve backtest, sepet başına sembol listesini bu
#  dosyadan yeniden-doldurulmuş haliyle okur (config yükleyici baskets'e enjekte
#  eder). Böylece strategy.yaml dosyasında yalnız strateji ağırlıkları kalır.
# =========================================================


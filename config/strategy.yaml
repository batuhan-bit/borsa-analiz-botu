# =========================================================
#  Strateji Konfigürasyonu
#  Tüm strateji parametreleri burada tek yerde tutulur.
#  Kod değiştirmeden ayar yapabilmek için buradan okunur.
# =========================================================

portfolio:
  budget_min: 1000          # USD
  budget_max: 5000          # USD
  horizon_months: 3
  target_return_pct: 6.5    # 3 aylık hedef portföy getirisi
  total_positions: 6        # her sepette 2 pozisyon
  positions_per_basket: 2
  execution: manual         # bot sadece sinyal üretir, alım-satımı kullanıcı yapar

# --- Sepet dağılımı (toplam bütçenin yüzdesi) ---
# Sembol listeleri burada DEĞİL, config/universe.yaml'da tutulur (tek gerçek
# kaynak). Config yükleyici her sepetin `universe` alanını universe.yaml'dan
# yeniden doldurur; burada yalnız ağırlık ve tanım kalır.
baskets:
  low_volatility:
    allocation_pct: 40
    description: "S&P 500 geneli, düşük beta hisseler/ETF'ler (savunmacı sektörler)"
    max_beta: 1.0

  high_volatility:
    allocation_pct: 35
    description: "Yarı iletken / AI donanım ve biyoteknoloji (kripto hariç)"

  under_radar:
    allocation_pct: 25
    description: >-
      Gelecek vaadeden sektörlerde (yapay zeka, uzay, kuantum, nükleer,
      savunma, sağlık teknolojisi, enerji depolama, robotik) faaliyet gösteren
      şirketler. Piyasa değeri S&P 500 mega-cap'lerinden çok daha küçük
      olabilir; öncelik: güçlü sektör ivmesi + sağlam bilanço veya önemli
      anlaşma/sözleşme.
    focus_sectors: [yapay_zeka, uzay, kuantum, nukleer, savunma,
                    saglik_teknolojisi, enerji_depolama, robotik]

# --- Teknik göstergeler ---
technical:
  rsi:
    period: 14
    overbought: 70
    oversold: 30
  macd:
    fast: 12
    slow: 26
    signal: 9
  moving_averages:
    short: 50
    long: 200        # 50/200 altın çaprazı & ölüm çaprazı
  volume_confirmation:
    lookback_days: 20
    min_multiplier: 1.5      # sinyal teyidi için hacim ortalamanın 1.5 katı
    direction_weight: 0.3    # yönlü hacim (toplama/dağıtım) skor ağırlığı (0 = kapalı)
  # Trend filtresi: fiyatın hareketli ortalamalara göre konumu. Fiyat MA'ların
  # altındaysa (kısa/orta vade düşüş) skor cezalandırılır — düşen bıçağı almayı
  # engeller. Değer büyüdükçe filtre sertleşir.
  trend_filter:
    price_vs_ma_long: 0.6    # fiyat 200G ortalamanın altında/üstünde
    price_vs_ma_short: 0.4   # fiyat 50G ortalamanın altında/üstünde

# --- Sinyal kararı ---
# Nihai skor [-1, 1] aralığında. Eşiklere göre BUY / SELL / HOLD.
signals:
  buy_threshold: 0.30
  sell_threshold: -0.30
  # Risk/Ödül kapısı: BUY sinyalinin hedef1'e uzaklığı, stop'a uzaklığının en az
  # bu katı olmalı. Altındaysa alım geçilir (HOLD) — risk/ödül disiplini.
  min_risk_reward: 1.0

# --- Temel analiz ---
fundamental:
  use_news: true
  use_earnings: true
  use_analyst_ratings: true
  # Alpha Vantage / web sinyallerine verilecek göreli ağırlık
  weight: 0.35            # teknik ağırlık = 1 - weight
  # Alpha Vantage ücretsiz limiti (25 istek/gün, 1 istek/sn) nedeniyle temel
  # analiz YALNIZCA teknik olarak dikkate değer sembollere uygulanır:
  min_technical_abs: 0.20    # |teknik skor| bu eşiğin altındaysa AV çağrısı yapma
  max_symbols_per_run: 6     # her koşuda en çok bu kadar sembol zenginleştirilir

# --- Risk yönetimi ---
risk:
  position_stop_loss_pct: 20    # tek pozisyon %20 kaybederse acil satış bildirimi
  portfolio_stop_loss_pct: null # portföy seviyesinde durdurma YOK

# --- Bildirim ---
notification:
  channel: slack
  frequency: daily
  send_after_market_close: true

# --- Backtesting ---
backtest:
  lookback_years: 3
  initial_capital: 3000

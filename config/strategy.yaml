# =========================================================
#  Strateji Konfigürasyonu
#  Tüm strateji parametreleri burada tek yerde tutulur.
#  Kod değiştirmeden ayar yapabilmek için buradan okunur.
# =========================================================

portfolio:
  budget_min: 1000          # USD
  budget_max: 5000          # USD
  horizon_months: 3
  target_return_pct: 6.5    # 3 aylık hedef portföy getirisi
  total_positions: 6        # her sepette 2 pozisyon
  positions_per_basket: 2
  execution: manual         # bot sadece sinyal üretir, alım-satımı kullanıcı yapar

  # --- Pozisyon boyutlandırma (Görev 2.2) ---
  # legacy: mevcut davranışı BİREBİR korur — sepetler strategy.yaml sırasıyla
  #   işlenir, her pozisyon min(sepet-hedefi, kalan nakit) kadar alınır. Sepet
  #   sırası öndeki sepetlere gün-içi nakit avantajı verir; radar-altı en sona
  #   kalan nakitle cılız dolar (bkz. pozisyon-boyutlandırma-denetimi.md).
  # v2: aynı gün tüm sepetlerdeki BUY adayları mevcut nakdi HEDEF AĞIRLIKLARI
  #   oranında paylaşır (sepet sırası avantajı yok). Gün-içi dolum oranı
  #   min_fill_pct'in altında kalırsa pozisyon O GÜN açılmaz, ertelenir (aday
  #   ertesi gün yeniden değerlendirilir). Toplam dağıtım deployment_pct ile
  #   sınırlanır (özsermayenin en az %(100-deployment_pct)'i nakit kalır).
  sizing:
    mode: v2                 # legacy | v2
    deployment_pct: 95       # portföyün en çok bu kadarı pozisyonlarda tutulur
    min_fill_pct: 0.60       # gün-içi dolum bu oranın altındaysa aç-ma, ertele
    fractional_shares: false # kesirli hisse alınabilsin mi (false = tam adet)

# --- Sepet dağılımı (toplam bütçenin yüzdesi) ---
baskets:
  low_volatility:
    allocation_pct: 40
    description: "S&P 500 geneli, düşük beta hisseler/ETF'ler (savunmacı sektörler)"
    max_beta: 1.0
    # İzlenecek evren (sinyal motoru bunları tarar). Genel ETF'ler dahil; kripto yok.
    universe: [SPY, XLP, XLU, JNJ, PG, KO, PEP, COST, WMT, MCD,
               CL, KMB, MDLZ, MO, NEE, DUK, SO, VZ, ABBV, MRK]

  high_volatility:
    allocation_pct: 35
    description: "Yarı iletken / AI donanım ve biyoteknoloji (kripto hariç)"
    universe: [NVDA, AMD, SMCI, TSM, AVGO, MU, QCOM, ARM, MRVL, LRCX,
               AMAT, ASML, PLTR, ANET, MRNA, BIIB, VRTX, REGN, CRSP, ALNY]

  under_radar:
    allocation_pct: 25
    description: >-
      Gelecek vaadeden sektörlerde (yapay zeka, uzay, kuantum, nükleer,
      savunma, sağlık teknolojisi, enerji depolama, robotik) faaliyet gösteren
      şirketler. Piyasa değeri S&P 500 mega-cap'lerinden çok daha küçük
      olabilir; öncelik: güçlü sektör ivmesi + sağlam bilanço veya önemli
      anlaşma/sözleşme.
    focus_sectors: [yapay_zeka, uzay, kuantum, nukleer, savunma,
                    saglik_teknolojisi, enerji_depolama, robotik]
    universe: [IONQ, RGTI, QBTS, RKLB, ASTS, LUNR, OKLO, SMR, NNE, FLNC,
               TEM, SYM, ALAB, POWL, CELH, HIMS, TDW, APP, ANF, KTOS]

# --- Teknik göstergeler ---
technical:
  rsi:
    period: 14
    overbought: 70
    oversold: 30
  macd:
    fast: 12
    slow: 26
    signal: 9
  moving_averages:
    short: 50
    long: 200        # 50/200 altın çaprazı & ölüm çaprazı
  volume_confirmation:
    lookback_days: 20
    min_multiplier: 1.5      # sinyal teyidi için hacim ortalamanın 1.5 katı
    direction_weight: 0.3    # yönlü hacim (toplama/dağıtım) skor ağırlığı (0 = kapalı)
  # Trend filtresi: fiyatın hareketli ortalamalara göre konumu. Fiyat MA'ların
  # altındaysa (kısa/orta vade düşüş) skor cezalandırılır — düşen bıçağı almayı
  # engeller. Değer büyüdükçe filtre sertleşir.
  trend_filter:
    price_vs_ma_long: 0.6    # fiyat 200G ortalamanın altında/üstünde
    price_vs_ma_short: 0.4   # fiyat 50G ortalamanın altında/üstünde

# --- Sinyal kararı ---
# Nihai skor [-1, 1] aralığında. Eşiklere göre BUY / SELL / HOLD.
signals:
  buy_threshold: 0.30
  sell_threshold: -0.30
  # Risk/Ödül kapısı: BUY sinyalinin hedef1'e uzaklığı, stop'a uzaklığının en az
  # bu katı olmalı. Altındaysa alım geçilir (HOLD) — risk/ödül disiplini.
  min_risk_reward: 1.0

# --- Temel analiz ---
fundamental:
  use_news: true
  use_earnings: true
  use_analyst_ratings: true
  # Alpha Vantage / web sinyallerine verilecek göreli ağırlık
  weight: 0.35            # teknik ağırlık = 1 - weight
  # Alpha Vantage ücretsiz limiti (25 istek/gün, 1 istek/sn) nedeniyle temel
  # analiz YALNIZCA teknik olarak dikkate değer sembollere uygulanır:
  min_technical_abs: 0.20    # |teknik skor| bu eşiğin altındaysa AV çağrısı yapma
  max_symbols_per_run: 6     # her koşuda en çok bu kadar sembol zenginleştirilir

# --- Risk yönetimi ---
risk:
  position_stop_loss_pct: 20    # tek pozisyon %20 kaybederse acil satış bildirimi
  portfolio_stop_loss_pct: null # portföy seviyesinde durdurma YOK

# --- Bildirim ---
notification:
  channel: slack
  frequency: daily
  send_after_market_close: true

# --- Backtesting ---
backtest:
  lookback_years: 3
  initial_capital: 3000
  # Tarih aralığı (Görev 1.2). null = varsayılan davranış (son lookback_years yıl).
  # CLI --start/--end bu değerleri ezer.
  start_date: null            # ör. "2016-01-01"
  end_date: null              # ör. "2022-12-31"
  # Dönem başından önce gösterge ısınması (MA200 vb.) için çekilen ekstra gün.
  warmup_days: 400
  # --- Gerçekçilik katmanı (Görev 2.1) ---
  # Dolgu fiyatı: close = sinyal günü kapanışı (eski, iyimser); next_open =
  # sinyal günü kapanışında karar, ertesi gün AÇILIŞINDAN doldur (gerçekçi —
  # canlıda sinyal kapanıştan sonra üretilir, işlem ancak ertesi gün açılır).
  fill: next_open             # close | next_open
  # İşlem maliyeti (baz puan = %0.01). Alış ve satışta ayrı ayrı uygulanır;
  # komisyon + kayma birlikte etkin fiyata gömülür (alışta yukarı, satışta
  # aşağı). 0 = maliyetsiz (eski davranış).
  commission_bps: 5           # işlem başına komisyon (bps)
  slippage_bps: 5             # işlem başına kayma (bps)
  # İstatistiksel dürüstlük (Görev 1.3): işlem PnL'lerinin yerine-koymalı
  # bootstrap örneklemesiyle toplam getiri güven aralığı.
  bootstrap:
    samples: 10000
    confidence: 0.90
  # Rejim bazlı alt-rapor pencereleri (ayı piyasası testleri)
  regime_windows:
    - name: "2018 Q4 düzeltmesi"
      start: "2018-10-01"
      end: "2018-12-31"
    - name: "Mart 2020 çöküşü"
      start: "2020-02-01"
      end: "2020-04-30"
    - name: "2022 ayı piyasası"
      start: "2022-01-01"
      end: "2022-12-31"
